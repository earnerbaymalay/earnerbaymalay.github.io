<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#e2e8f0" letter-spacing="2">THE LOCAL-FIRST ECOSYSTEM</text>
  <text x="600" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">13 open-source projects. Zero cloud dependency. One philosophy.</text>

  <!-- Center hub -->
  <circle cx="600" cy="310" r="50" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="600" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#3b82f6">⬡</text>
  <text x="600" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">SIDELOAD</text>

  <!-- Aether (flagship) - top center -->
  <line x1="600" y1="260" x2="600" y2="130" stroke="#58A6FF" stroke-width="1" opacity="0.4"/>
  <rect x="480" y="90" width="240" height="56" rx="10" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.3)" stroke-width="1.5"/>
  <text x="600" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#00D4AA">🌌 AETHER</text>
  <text x="600" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">AI Workstation · Android + Apple</text>

  <!-- Cypherchat - top left -->
  <line x1="550" y1="275" x2="300" y2="130" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <rect x="180" y="90" width="220" height="56" rx="10" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="290" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#10b981">🛡️ CYPHERCHAT</text>
  <text x="290" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">E2EE Messaging · Android + PWA</text>

  <!-- Gloam - top right -->
  <line x1="650" y1="275" x2="900" y2="130" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="800" y="90" width="220" height="56" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="910" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f59e0b">🌗 GLOAM</text>
  <text x="910" y="133" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Solar Journal · Android + Desktop</text>

  <!-- Tools row -->
  <line x1="550" y1="345" x2="250" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="360" x2="500" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="650" y1="345" x2="750" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="360" x2="950" y2="420" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="580" y1="360" x2="250" y2="500" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="620" y1="360" x2="950" y2="500" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>

  <!-- Tool 1 -->
  <rect x="140" y="400" width="180" height="40" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="230" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">🔐 Termux-Vault</text>

  <!-- Tool 2 -->
  <rect x="370" y="400" width="180" height="40" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="460" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">💻 Multi-AI Terminal</text>

  <!-- Tool 3 -->
  <rect x="660" y="400" width="180" height="40" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="750" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">⚡ Nexus Optimizer</text>

  <!-- Tool 4 -->
  <rect x="890" y="400" width="180" height="40" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="980" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">🤖 AI Hub Widget</text>

  <!-- Tool 5 -->
  <rect x="140" y="480" width="180" height="40" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="230" y="505" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">🛡️ Edge Sentinel</text>

  <!-- Tool 6 -->
  <rect x="890" y="480" width="180" height="40" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <text x="980" y="505" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#8b5cf6">🧬 CasCad Mobile</text>

  <!-- Bottom tagline -->
  <rect x="350" y="565" width="500" height="36" rx="18" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="600" y="588" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#3b82f6" letter-spacing="1">GITHUB.COM/EARNERBAYMALAY</text>
</svg>
