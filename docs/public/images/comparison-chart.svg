  <text x="120" y="169" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">💰 Cost</text>
  <text x="450" y="169" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">"Free tier available"</text>
  <text x="785" y="169" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">$0 — forever</text>

  <!-- Row 2: Privacy -->
  <rect x="100" y="188" width="1000" height="48" fill="rgba(17,24,39,0.3)"/>
  <text x="120" y="217" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">🔒 Your data</text>
  <text x="450" y="217" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">"We don't train on your data"</text>
  <text x="785" y="217" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">Never leaves your device</text>

  <!-- Row 3: Internet -->
  <rect x="100" y="236" width="1000" height="48" fill="rgba(17,24,39,0.5)"/>
  <text x="120" y="265" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">🌐 Internet needed</text>
  <text x="450" y="265" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">"Works everywhere"</text>
  <text x="785" y="265" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">Works on a plane ✈️</text>

  <!-- Row 4: Identity -->
  <rect x="100" y="284" width="1000" height="48" fill="rgba(17,24,39,0.3)"/>
  <text x="120" y="313" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">🆔 Account needed</text>
