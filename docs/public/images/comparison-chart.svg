  <text x="785" y="409" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">Persistent. Local. Yours.</text>

  <!-- Row 7: Latency -->
  <rect x="100" y="428" width="1000" height="48" fill="rgba(17,24,39,0.5)"/>
  <text x="120" y="457" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">⚡ Speed</text>
  <text x="450" y="457" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">"Optimized for performance"</text>
  <text x="785" y="457" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">25+ tokens/sec locally</text>

  <!-- Row 8: The real cost -->
  <rect x="100" y="476" width="1000" height="48" fill="rgba(17,24,39,0.3)"/>
  <text x="120" y="505" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">📊 The real cost</text>
  <text x="450" y="505" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">$20-200/mo + your data</text>
  <text x="785" y="505" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">$0. Zero. Nothing.</text>

  <!-- Bottom CTA -->
  <rect x="350" y="555" width="500" height="48" rx="8" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="600" y="584" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#00D4AA" letter-spacing="1">GITHUB.COM/EARNERBAYMALAY/AETHER</text>
</svg>
