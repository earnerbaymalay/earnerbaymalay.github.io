  <text x="450" y="361" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">"Safety guardrails"</text>
  <text x="785" y="361" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00D4AA">Uncensored. Your rules.</text>

  <!-- Row 6: Memory -->
  <rect x="100" y="380" width="1000" height="48" fill="rgba(17,24,39,0.3)"/>
  <text x="120" y="409" font-family="system-ui,sans-serif" font-size="14" fill="#94A3B8">🧠 Memory</text>
