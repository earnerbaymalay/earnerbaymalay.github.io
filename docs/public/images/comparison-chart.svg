<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#e2e8f0" letter-spacing="2">THE REAL COST OF "FREE" AI</text>
  <text x="600" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">What you pay vs what you actually give</text>

  <!-- Table header -->
  <rect x="100" y="100" width="333" height="40" rx="0" fill="#111827"/>
  <rect x="433" y="100" width="334" height="40" fill="#0c1322"/>
  <rect x="767" y="100" width="333" height="40" rx="0" fill="#111827"/>
  <text x="266" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#64748b">CHATGPT / CLAUDE</text>
  <text x="600" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#64748b">WHAT THEY SAY</text>
  <text x="933" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#00D4AA">AETHER (LOCAL)</text>

  <!-- Row 1: Cost -->
