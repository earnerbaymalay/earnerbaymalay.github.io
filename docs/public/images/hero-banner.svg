<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="50%" style="stop-color:#58A6FF"/>
      <stop offset="100%" style="stop-color:#BC8CFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#58A6FF" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Glowing orb behind text -->
  <circle cx="600" cy="280" r="200" fill="#58A6FF" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Neural network nodes -->
  <g opacity="0.6">
    <circle cx="200" cy="150" r="3" fill="#00D4AA"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="100" r="3" fill="#58A6FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="120" r="3" fill="#BC8CFF"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="200" r="3" fill="#00D4AA"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="400" r="3" fill="#BC8CFF"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="350" r="3" fill="#58A6FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <line x1="200" y1="150" x2="350" y2="100" stroke="#58A6FF" stroke-width="0.5" opacity="0.3"/>
    <line x1="350" y1="100" x2="850" y2="120" stroke="#58A6FF" stroke-width="0.5" opacity="0.3"/>
    <line x1="850" y1="120" x2="1000" y2="200" stroke="#BC8CFF" stroke-width="0.5" opacity="0.3"/>
    <line x1="200" y1="150" x2="150" y2="400" stroke="#BC8CFF" stroke-width="0.5" opacity="0.3"/>
    <line x1="1000" y1="200" x2="1050" y2="350" stroke="#58A6FF" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Main title -->
  <text x="600" y="220" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="url(#accent)" filter="url(#glow)" letter-spacing="8">AETHER</text>

  <!-- Subtitle -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="400" fill="#94A3B8" letter-spacing="3">YOUR PHONE. YOUR AI. YOUR RULES.</text>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#64748b">100% offline. Free forever. Zero data collection.</text>

  <!-- Divider line -->
  <line x1="450" y1="380" x2="750" y2="380" stroke="#1e2a3a" stroke-width="1"/>

  <!-- Feature pills -->
  <rect x="280" y="410" width="140" height="32" rx="16" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="350" y="431" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#00D4AA" letter-spacing="1">OFFLINE AI</text>

  <rect x="440" y="410" width="160" height="32" rx="16" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="520" y="431" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#58A6FF" letter-spacing="1">4 AI MODELS</text>

  <rect x="620" y="410" width="140" height="32" rx="16" fill="rgba(188,140,255,0.1)" stroke="rgba(188,140,255,0.3)" stroke-width="1"/>
  <text x="690" y="431" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#BC8CFF" letter-spacing="1">OPEN SOURCE</text>

  <rect x="780" y="410" width="140" height="32" rx="16" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="850" y="431" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#F59E0B" letter-spacing="1">ZERO TRACKING</text>

  <!-- GitHub badge -->
  <rect x="475" y="480" width="250" height="40" rx="8" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.2)" stroke-width="1"/>
  <text x="600" y="505" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#58A6FF">github.com/earnerbaymalay/aether</text>

  <!-- Bottom accent line -->
  <rect x="500" y="560" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <text x="600" y="590" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569" letter-spacing="2">DEVELOP NATIVELY · THINK LOCALLY · EVOLVE AUTONOMOUSLY</text>
</svg>
