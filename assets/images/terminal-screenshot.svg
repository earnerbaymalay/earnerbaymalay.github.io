<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="100" y="60" width="1000" height="510" rx="12" fill="#0D1117" stroke="#1e2a3a" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="100" y="60" width="1000" height="36" rx="12" fill="#161b27"/>
  <rect x="100" y="78" width="1000" height="18" fill="#161b27"/>
  <circle cx="124" cy="78" r="6" fill="#ff5f57"/>
  <circle cx="144" cy="78" r="6" fill="#febc2e"/>
  <circle cx="164" cy="78" r="6" fill="#28c840"/>
  <text x="600" y="83" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">aether — neural operating interface</text>

  <!-- Terminal content -->
  <text x="140" y="130" fill="#58A6FF" font-family="monospace" font-size="14">  $ ai</text>

  <text x="140" y="170" fill="#58A6FF" font-family="monospace" font-size="13">  ╔══════════════════════════════════════════╗</text>
  <text x="140" y="190" fill="#58A6FF" font-family="monospace" font-size="13">  ║          🌌  A E T H E R  🌌            ║</text>
  <text x="140" y="210" fill="#94A3B8" font-family="monospace" font-size="12">  ║   NEURAL OPERATING INTERFACE // V 18.0   ║</text>
  <text x="140" y="230" fill="#58A6FF" font-family="monospace" font-size="13">  ╚══════════════════════════════════════════╝</text>

  <text x="160" y="260" fill="#10b981" font-family="monospace" font-size="12"> 🔋 BATT: 78%  •  💾 STR: 42G  •  🧠 VAULT: ACTIVE</text>

  <text x="160" y="300" fill="#64748b" font-family="monospace" font-size="12">  ┌────────────────────────────────────────────┐</text>
  <text x="160" y="320" fill="#64748b" font-family="monospace" font-size="12">  │  [ SELECT NEURAL PATHWAY ]                 │</text>
  <text x="160" y="340" fill="#64748b" font-family="monospace" font-size="12">  │                                            │</text>
  <text x="160" y="360" fill="#e2e8f0" font-family="monospace" font-size="12">  │  </text><text x="178" y="360" fill="#f59e0b" font-family="monospace" font-size="12">▸ 🤖 AGENT</text><text x="280" y="360" fill="#64748b" font-family="monospace" font-size="12">   (Hermes-8B)  </text><text x="440" y="360" fill="#10b981" font-family="monospace" font-size="11">Smartest. Code + tools.</text><text x="660" y="360" fill="#64748b" font-family="monospace" font-size="12">  │</text>
  <text x="160" y="380" fill="#64748b" font-family="monospace" font-size="12">  │    ⚡ TURBO   (Llama-3B)   </text><text x="440" y="380" fill="#10b981" font-family="monospace" font-size="11">Fastest. Daily tasks.  </text><text x="660" y="380" fill="#64748b" font-family="monospace" font-size="12">  │</text>
  <text x="160" y="400" fill="#64748b" font-family="monospace" font-size="12">  │    🧠 LOGIC   (DeepSeek)   </text><text x="440" y="400" fill="#10b981" font-family="monospace" font-size="11">Deep thinker. Planning. </text><text x="660" y="400" fill="#64748b" font-family="monospace" font-size="12">  │</text>
  <text x="160" y="420" fill="#64748b" font-family="monospace" font-size="12">  │    💻 CODE    (Qwen-3B)    </text><text x="440" y="420" fill="#10b981" font-family="monospace" font-size="11">Coding specialist.      </text><text x="660" y="420" fill="#64748b" font-family="monospace" font-size="12">  │</text>
  <text x="160" y="440" fill="#64748b" font-family="monospace" font-size="12">  │    🛡️ SECURITY (Sentinel)  </text><text x="440" y="440" fill="#10b981" font-family="monospace" font-size="11">System audit.           </text><text x="660" y="440" fill="#64748b" font-family="monospace" font-size="12">  │</text>
  <text x="160" y="460" fill="#64748b" font-family="monospace" font-size="12">  │    🛠 TOOLS   (Skills)     </text><text x="440" y="460" fill="#10b981" font-family="monospace" font-size="11">Plugins + benchmark.    </text><text x="660" y="460" fill="#64748b" font-family="monospace" font-size="12">  │</text>
  <text x="160" y="480" fill="#64748b" font-family="monospace" font-size="12">  └────────────────────────────────────────────┘</text>

  <!-- Cursor blink -->
  <rect x="176" y="347" width="8" height="14" fill="#e2e8f0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Annotation arrows -->
  <g opacity="0.6">
    <line x1="680" y1="360" x2="850" y2="310" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="855" y="295" width="220" height="30" rx="6" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="965" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b">Agent uses 10+ real device tools</text>

    <line x1="680" y1="380" x2="850" y2="360" stroke="#58A6FF" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="855" y="345" width="220" height="30" rx="6" fill="rgba(88,166,255,0.1)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
    <text x="965" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#58A6FF">25+ tokens/sec on flagship devices</text>

    <line x1="680" y1="460" x2="850" y2="440" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
    <rect x="855" y="425" width="220" height="30" rx="6" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="965" y="445" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">Drop-in skills extend AI behavior</text>
  </g>
</svg>
